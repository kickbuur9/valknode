apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-server
  labels:
    app: fleet-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fleet-server
  template:
    metadata:
      labels:
        app: fleet-server
    spec:
      containers:
      - name: fleet-server
        image: docker.elastic.co/elastic-agent/elastic-agent:8.14.0
        args: ["run", "-c", "/etc/elastic-agent/fleet.yml"]  # <- This is the key fix
        ports:
        - containerPort: 8220
          name: https-agents
        - containerPort: 8221
          name: https-internal
        env:
        - name: FLEET_ENROLLMENT_TOKEN
          value: "N2xHTFFKZ0JYdVVfZllLczZZdEU6RS1uS1djWFhTRTZpNkN4ckdubVQyUQ=="
        - name: FLEET_SERVER_TOKEN
          value: "AAEAAWVsYXN0aWMvZmxlZXQtc2VydmVyL2ZsZWV0LXRva2VuOmRtd0s2dE5pUnF1YVNSbHN5Z3ozdUE"
        volumeMounts:
        - name: certs
          mountPath: /etc/elastic-agent/certs
          readOnly: true
        - name: fleet-server-config
          mountPath: /etc/elastic-agent/fleet.yml
          subPath: fleet.yml
          readOnly: true
        - name: fleet-server-data
          mountPath: /usr/share/elastic-agent/data
      volumes:
      - name: certs
        secret:
          secretName: fleet-server-cert
          items:
          - key: tls.crt
            path: fleet-server.crt
          - key: tls.key
            path: fleet-server.key
          - key: ca.crt
            path: ca.crt
      - name: fleet-server-config
        configMap:
          name: fleet-server-config
      - name: fleet-server-data
        emptyDir: {}
